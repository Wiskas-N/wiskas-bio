<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>чипсики</title>

<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>
<div class="custom-cursor"></div>
<div id="start-screen">
<div class="start-title">Tap to enter</div>
</div>

<video id="bg-video" class="bg-video" loop playsinline muted preload="none">
<source src="background.mp4" type="video/mp4">
</video>



<div class="card">

<div class="avatar">
<video class="avatar-video" autoplay muted loop playsinline>
<source src="avatar.mp4" type="video/mp4">
</video>
</div>

<div class="name">Wiskas</div>
<div class="username">@wiskas_vn</div>

<div class="badges">
<i class="fa-solid fa-laptop-code"></i>
<i class="fa-solid fa-code"></i>
</div>

<div class="info">
<p>14 y.o developer</p>
<p>frontend & design</p>
</div>

<div class="social">
<a href="https://discord.com/users/123456789012345678"><i class="fa-brands fa-discord"></i></a>
<a href="https://t.me/wiskas_vn"><i class="fa-brands fa-telegram"></i></a>
</div>

<div class="location">
<i class="fa-solid fa-location-dot"></i>
vietnam
</div>

</div>

<script>

const startScreen = document.getElementById("start-screen");
const bgVideo = document.getElementById("bg-video");

function startExperience(){

if(bgVideo){
bgVideo.muted = true;
bgVideo.volume = 0.6;

bgVideo.play().then(()=>{
bgVideo.muted = false;
}).catch(()=>{
console.log("Playback blocked");
});
}

startScreen.classList.add("hidden");

}

startScreen.addEventListener("click", startExperience, {once:true});
startScreen.addEventListener("touchstart", startExperience, {once:true});

const cursor = document.querySelector(".custom-cursor");

document.addEventListener("mousemove", (e)=>{
cursor.style.left = e.clientX + "px";
cursor.style.top = e.clientY + "px";
});

</script>




</body>
</html>
